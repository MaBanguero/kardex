<div id="modal-container" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden transform transition-all scale-95 opacity-0 duration-300" id="modal-box">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h3 class="font-bold text-slate-800">Registrar Movimiento</h3>
            <button onclick="cerrarModal()" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-times text-xl"></i></button>
        </div>

        <form id="form-movimiento" class="p-6 space-y-5">
            {% csrf_token %}
            <input type="hidden" id="modal-id-med">

            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Medicamento</p>
                <p id="modal-nombre-med" class="text-blue-700 font-bold text-lg leading-tight"></p>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Tipo de Operación</label>
                <select id="modal-tipo" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition font-medium text-slate-700">
                    <option value="SALIDA">Salida a Paciente</option>
                    <option value="DEVOLUCION">Devolución a Bodega</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">ID Paciente / Historia</label>
                <input type="text" id="modal-paciente" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition font-medium text-slate-700" placeholder="Ingrese documento">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Cantidad Unidades</label>
                <input type="number" id="modal-cantidad" required min="1" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-xl font-bold text-slate-800 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition">
            </div>

            <div class="pt-2">
                <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 shadow-lg shadow-blue-600/30 active:scale-[0.98] transition-all">
                    Confirmar Registro
                </button>
            </div>
        </form>
    </div>
</div>

<div id="modal-devolucion" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity">
    <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-6 transform scale-95 opacity-0 transition-all duration-300" id="box-devolucion">
        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
            <i class="fas fa-undo text-blue-500"></i> Procesar Devolución
        </h3>

        <div class="bg-slate-50 p-4 rounded-xl mb-4 border border-slate-100">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Medicamento a devolver</p>
            <p id="dev-med-nombre" class="font-bold text-slate-800 text-lg leading-tight mt-1"></p>
            <p class="text-sm text-slate-500 mt-2">Retirado para: <span id="dev-paciente" class="font-bold text-slate-700"></span></p>
        </div>

        <form id="form-devolucion">
            <input type="hidden" id="dev-doc-id">
            <input type="hidden" id="dev-stock-id"> <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Cantidad a Reingresar</label>
            <input type="number" id="dev-cantidad" required min="1" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-2xl text-center font-black text-slate-800 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition mb-6">

            <div class="flex gap-3">
                <button type="button" onclick="cerrarModalDev()" class="flex-1 py-3.5 text-slate-600 font-bold bg-slate-100 hover:bg-slate-200 rounded-xl transition-all">
                    Cancelar
                </button>
                <button type="submit" id="btn-submit-dev" class="flex-[1.5] py-3.5 text-white font-bold bg-blue-600 hover:bg-blue-700 rounded-xl shadow-lg shadow-blue-600/30 active:scale-95 transition-all">
                    Confirmar
                </button>
            </div>
        </form>
    </div>
</div>
