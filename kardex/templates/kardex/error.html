{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center animate-fade-in">
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-red-100 max-w-lg w-full text-center">

        <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-inner">
            <i class="fas fa-shield-alt"></i>
        </div>

        <h1 class="text-3xl font-black text-slate-800 mb-2">Acceso Restringido</h1>

        <p class="text-slate-500 font-medium mb-8">
            {{ mensaje|default:"No tienes los permisos necesarios para ver esta página." }}
        </p>

        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-8 text-sm text-slate-400">
            Si crees que esto es un error, por favor contacta al administrador del sistema para que revise tus roles asignados.
        </div>

        <a href="{% url 'dashboard' %}" class="inline-flex items-center justify-center gap-2 w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition active:scale-95 shadow-lg">
            <i class="fas fa-arrow-left"></i> Volver al Inicio
        </a>

    </div>
</div>

<style>
    /* Opcional: Si quieres que la pantalla de error ocupe todo el ancho */
    main { margin-left: auto !important; margin-right: auto !important; max-width: 1200px; }
</style>
{% endblock %}
