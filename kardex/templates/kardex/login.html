{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-white p-10 rounded-3xl shadow-2xl border border-slate-100 animate-fade-in">

        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg shadow-blue-600/30">
                <i class="fas fa-prescription-bottle-alt"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Kardex<span class="text-blue-600">Pro</span></h1>
            <p class="text-sm text-slate-500 font-medium mt-1">Acceso Seguro al Sistema</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-bold flex items-center gap-2 mb-6 border border-red-100">
            <i class="fas fa-exclamation-triangle"></i> Usuario o contraseña incorrectos.
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Nombre de Usuario</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" name="username" required autofocus class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-700 transition">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Contraseña</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" name="password" required class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none text-slate-700 transition">
                </div>
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-600 shadow-lg shadow-slate-900/20 transition-all active:scale-95 flex justify-center items-center gap-2 mt-2">
                Ingresar al Sistema <i class="fas fa-arrow-right"></i>
            </button>
        </form>

    </div>
</div>

<style>
    /* Asumiendo que tu sidebar tiene un id 'sidebar' y tu header un id 'top-header' */
    #sidebar, #top-header { display: none !important; }
    main { margin-left: 0 !important; padding-top: 2rem !important; }
</style>
{% endblock %}
